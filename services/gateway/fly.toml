app = "aegntic-gateway"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[http_service.ports]
  handlers = ["tls", "http"]
  ports = [443, 80]

[metrics]
  port = 9091
  path = "/metrics"

[checks]
  [checks.health]
    type = "http"
    interval = "10s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"